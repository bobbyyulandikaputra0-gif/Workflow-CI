name: CI - Retrain Model (MLflow Project)

on:
  push:
    branches: [main]
    paths:
      - "MLProject/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Jumlah trees RandomForest"
        default: "200"
      max_depth:
        description: "Kedalaman maksimum (0 = None)"
        default: "20"

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install mlflow==2.19.0 scikit-learn==1.5.2 pandas==2.2.3 numpy==1.26.4

      - name: Run MLflow Project (re-training)
        run: |
          mlflow run MLProject --env-manager=local \
            -P n_estimators=${{ github.event.inputs.n_estimators || 200 }} \
            -P max_depth=${{ github.event.inputs.max_depth || 20 }}

      - name: Upload model artifacts (mlruns)
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model-artifacts
          path: mlruns/

      - name: Commit & push latest mlruns to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f mlruns/
          git diff --cached --quiet || git commit -m "ci: simpan artefak model hasil re-training [skip ci]"
          git push
